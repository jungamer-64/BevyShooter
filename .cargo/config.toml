[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

[target.wasm32-unknown-unknown]
runner = "wasm-server-runner"
rustflags = [
    "--cfg", "getrandom_backend=\"wasm_js\"",
    "-C", "target-feature=+bulk-memory,+mutable-globals,+nontrapping-fptoint"
]

[alias]
dev = "run --features dev-logging"
rel = "build --release"
wasm = "run --target wasm32-unknown-unknown"
wasm-dev = "run --target wasm32-unknown-unknown --features dev-logging"
wasm-rel = "run --release --target wasm32-unknown-unknown"
